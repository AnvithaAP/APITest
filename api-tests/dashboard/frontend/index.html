<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Test Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #0f172a; color: #e2e8f0; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
      .kpi { border: 1px solid #334155; border-radius: 10px; padding: 10px; background: #111827; }
      canvas { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 12px; }
    </style>
  </head>
  <body>
    <h1>Live API Test Metrics</h1>
    <p id="status">Loading live data…</p>
    <div class="kpis">
      <div class="kpi"><b>Pass Rate</b><div id="passRate">-</div></div>
      <div class="kpi"><b>Error Rate</b><div id="errorRate">-</div></div>
      <div class="kpi"><b>Throughput</b><div id="throughput">-</div></div>
      <div class="kpi"><b>Total Tests</b><div id="totalTests">-</div></div>
    </div>
    <div class="grid">
      <canvas id="latencyChart"></canvas>
      <canvas id="statusChart"></canvas>
    </div>

    <script>
      const apiBase = window.API_BASE || 'http://localhost:8080';

      const latencyChart = new Chart(document.getElementById('latencyChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Latency (ms)', data: [], borderColor: '#60a5fa' }] },
        options: { responsive: true }
      });

      const statusChart = new Chart(document.getElementById('statusChart'), {
        type: 'bar',
        data: { labels: ['Passed', 'Failed'], datasets: [{ label: 'Result count', data: [0, 0], backgroundColor: ['#34d399', '#f87171'] }] },
        options: { responsive: true }
      });

      async function pullJson(path) {
        const response = await fetch(`${apiBase}${path}`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      }

      async function refresh() {
        try {
          const [resultsPayload, kpiPayload] = await Promise.all([
            pullJson('/results'),
            pullJson('/kpi')
          ]);

          const results = resultsPayload.results || [];
          const passed = results.filter(r => r.status === 'passed').length;
          const failed = results.filter(r => r.status === 'failed').length;

          latencyChart.data.labels = results.map(r => r.test_name || r.run_id || 'test');
          latencyChart.data.datasets[0].data = kpiPayload.latency_trend || [];
          latencyChart.update();

          statusChart.data.datasets[0].data = [passed, failed];
          statusChart.update();

          document.getElementById('passRate').textContent = `${((kpiPayload.pass_rate || 0) * 100).toFixed(2)}%`;
          document.getElementById('errorRate').textContent = `${((kpiPayload.error_rate || 0) * 100).toFixed(2)}%`;
          document.getElementById('throughput').textContent = `${kpiPayload.throughput || 0} tests/s`;
          document.getElementById('totalTests').textContent = `${kpiPayload.total_tests || 0}`;
          document.getElementById('status').textContent = `LIVE pipeline active: ${resultsPayload.summary?.total_runs || 0} runs aggregated`;
        } catch (err) {
          document.getElementById('status').textContent = `Failed to load metrics: ${err.message}`;
        }
      }

      refresh();
      setInterval(refresh, 10000);
    </script>
  </body>
</html>
