<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Test Live Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; background: #0f172a; color: #e2e8f0; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
      .kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
      .kpi { border: 1px solid #334155; border-radius: 10px; padding: 10px; background: #111827; }
      canvas { background: #111827; border: 1px solid #334155; border-radius: 12px; padding: 12px; }
      code { color: #93c5fd; }
    </style>
  </head>
  <body>
    <h1>Live API Test Metrics</h1>
    <p id="status">Loading live data…</p>
    <div class="kpis">
      <div class="kpi"><b>Pass Rate</b><div id="passRate">-</div></div>
      <div class="kpi"><b>Error Rate</b><div id="errorRate">-</div></div>
      <div class="kpi"><b>Throughput</b><div id="throughput">-</div></div>
      <div class="kpi"><b>Release</b><div id="releaseState">-</div></div>
    </div>
    <div class="grid">
      <canvas id="latencyChart"></canvas>
      <canvas id="throughputChart"></canvas>
    </div>

    <script>
      const apiBase = window.API_BASE || 'http://localhost:8080';

      const latencyChart = new Chart(document.getElementById('latencyChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: 'Latency avg (ms)', data: [], borderColor: '#60a5fa' }] },
        options: { responsive: true }
      });

      const throughputChart = new Chart(document.getElementById('throughputChart'), {
        type: 'bar',
        data: { labels: [], datasets: [{ label: 'Throughput avg', data: [], backgroundColor: '#34d399' }] },
        options: { responsive: true }
      });

      async function pullMetrics() {
        const response = await fetch(`${apiBase}/metrics`);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
      }

      async function refresh() {
        try {
          const payload = await pullMetrics();
          const points = payload.timeline || [];

          const labels = points.map(p => p.timestamp);
          latencyChart.data.labels = labels;
          latencyChart.data.datasets[0].data = points.map(p => p.latency_avg_ms || 0);
          latencyChart.update();

          throughputChart.data.labels = labels;
          throughputChart.data.datasets[0].data = points.map(p => p.throughput_avg || 0);
          throughputChart.update();

          const summary = (payload.kpi && payload.kpi.summary) || {};
          const release = (((payload.aggregated || {}).release_readiness) || {}).status || 'unknown';
          document.getElementById('passRate').textContent = `${summary.pass_rate || 0}%`;
          document.getElementById('errorRate').textContent = `${((summary.error_rate || 0) * 100).toFixed(2)}%`;
          document.getElementById('throughput').textContent = `${summary.throughput_tests_per_second || 0} t/s`;
          document.getElementById('releaseState').textContent = release;

          document.getElementById('status').textContent = `Live data bound. Samples: ${points.length}. Repo cards: ${((payload.aggregated || {}).repo_cards || []).length}`;
        } catch (err) {
          document.getElementById('status').textContent = `Failed to load metrics: ${err.message}`;
        }
      }

      refresh();
      setInterval(refresh, 10000);
    </script>
  </body>
</html>
