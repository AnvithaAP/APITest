stages:
  - orchestrate
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - python --version
  - pip install -r requirements.txt

orchestrate_multi_repo:
  stage: orchestrate
  script:
    - python orchestrator/enterprise_orchestrator.py --local-repos-file repos.json --query "scope=api AND intent=functional" --runner pytest --parallel 4
  artifacts:
    when: always
    paths:
      - artifacts/orchestrator_results.json
      - artifacts/aggregated_canonical.json
      - artifacts/gitlab_pipeline_triggers.json

test_local_suite:
  stage: test
  script:
    - python runners/pytest_runner.py --query "scope=api AND intent=functional"
  artifacts:
    when: always
    paths:
      - artifacts/canonical_run.json
      - artifacts/allure-results
      - artifacts/pytest_report.json

publish_reporting:
  stage: report
  script:
    - python dashboard/dashboard.py --aggregated artifacts/aggregated_canonical.json --out artifacts/dashboard.html
    - python -c "from integrations.ado_client import write_ado_submission; write_ado_submission('artifacts/aggregated_canonical.json', 'artifacts/ado_submission.json')"
  artifacts:
    when: always
    paths:
      - artifacts/dashboard.html
      - artifacts/dashboard_trends.png
      - artifacts/ado_submission.json
      - artifacts/allure-results-merged
