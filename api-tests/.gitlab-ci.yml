stages:
  - validate
  - test
  - performance
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  TAG_QUERY: "scope=api AND intent=functional"
  PERF_QUERY: "scope=api AND intent=performance"

cache:
  paths:
    - .cache/pip

.default_python:
  image: python:3.11
  before_script:
    - python -V
    - pip install -r requirements.txt

validate_tags:
  stage: validate
  extends: .default_python
  script:
    - python -m pytest functional governance --collect-only --tag-guard-mode=strict

run_functional:
  stage: test
  extends: .default_python
  script:
    - python orchestrator/execution_router.py --runner pytest --query "$TAG_QUERY" --tag-guard-mode strict
  artifacts:
    when: always
    paths:
      - artifacts/

run_k6:
  stage: performance
  image: grafana/k6:latest
  script:
    - k6 run performance/latency/k6_latency.js
  artifacts:
    when: always
    paths:
      - artifacts/

aggregate_reports:
  stage: report
  extends: .default_python
  script:
    - python history/trend_analyzer.py --db artifacts/history.db --out artifacts/history_trends.html
  artifacts:
    when: always
    paths:
      - artifacts/canonical_run.json
      - artifacts/html_report.html
      - artifacts/history_trends.html
      - artifacts/allure-results/
