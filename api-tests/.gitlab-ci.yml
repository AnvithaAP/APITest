stages:
  - validate
  - orchestrate
  - test
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

before_script:
  - python --version
  - pip install -r requirements.txt


validate-tags:
  stage: validate
  script:
    - python -m tagging.tag_validator_cli

validate_governance:
  stage: validate
  script:
    - python tagging/tag_governance.py functional performance governance
    - pytest --collect-only -q

orchestrate_multi_repo:
  stage: orchestrate
  script:
    - python orchestrator/enterprise_orchestrator.py --local-repos-file repos.json --query "scope=api AND intent=functional" --runner pytest --parallel 4
  artifacts:
    when: always
    paths:
      - artifacts/orchestrator_results.json
      - artifacts/aggregated_canonical.json
      - artifacts/gitlab_pipeline_triggers.json

test_parallel_suite:
  stage: test
  script:
    - pytest -n auto -q
    - python runners/distributed_runner.py --execution-mode local --query "scope=api"
  artifacts:
    when: always
    paths:
      - artifacts/canonical_run.json
      - artifacts/allure-results
      - artifacts/pytest_report.json
      - artifacts/distributed_execution.json
      - artifacts/k8s_jobs.json

publish_reporting:
  stage: report
  script:
    - python dashboard/dashboard.py --aggregated artifacts/aggregated_canonical.json --out artifacts/dashboard.html
    - python integrations/ado_client.py --aggregated artifacts/aggregated_canonical.json --out artifacts/ado_submission.json
  artifacts:
    when: always
    paths:
      - artifacts/dashboard.html
      - artifacts/dashboard_trends.png
      - artifacts/ado_submission.json
      - artifacts/allure-results-merged
